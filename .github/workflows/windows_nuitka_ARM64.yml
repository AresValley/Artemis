name: Build - Windows ARM64 (nuitka)

on:
  workflow_dispatch:
    inputs:
      artemis_version:
        description: 'Version'
        required: true
        default: '4.1.0'
        type: string

jobs:
  build-windows-ARM64:
    runs-on: windows-11-arm64
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync

      - name: Build and package
        run: ./building/Windows/build_nuitka.ps1
        shell: powershell

      - name: Building installer (ISCC)
        run: iscc ./building/Windows/windows_installer.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Artemis-Windows-x86_64-${{github.event.inputs.artemis_version}}
          path: ./building/artemis.exe
